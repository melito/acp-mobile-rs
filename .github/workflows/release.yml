name: release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push github v0.1.0
# This creates a GitHub Release for the tag, then builds acp-mobile for each
# target and attaches the archives. cargo-binstall and the agent-relay installer
# can then download a prebuilt binary instead of compiling from source.
#
# NOTE: acp-mobile embeds static/index.html via include_str!, so the web UI
# ships inside the binary -- the release asset is self-contained, no extra files.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the Release and upload assets

jobs:
  # The upload action attaches assets to an EXISTING release; pushing a tag only
  # creates a ref, not a Release object. So create the release first, once, and
  # have every build job depend on it -- otherwise each matrix leg races to
  # upload to a release that doesn't exist yet ("release not found").
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --title "${GITHUB_REF_NAME}" --generate-notes

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin       # Apple Silicon
            os: macos-latest
          - target: x86_64-apple-darwin        # Intel Mac
            os: macos-latest
          - target: x86_64-unknown-linux-gnu   # most Linux servers
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu  # ARM Linux boxes
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: acp-mobile
          target: ${{ matrix.target }}
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
